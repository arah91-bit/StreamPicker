# Standalone deployment of the stream-picker addon — this file, a .env, and one
# generated encryption-key file are the entire install; the image is prebuilt.
#
#   mkdir stream-picker && cd stream-picker
#   curl -O  https://raw.githubusercontent.com/arah91-bit/StreamPicker/main/docker-compose.yml
#   curl -o .env https://raw.githubusercontent.com/arah91-bit/StreamPicker/main/.env.example
#   install -d -m 700 secrets && openssl rand -out secrets/stream-picker-config.key 32
#   chmod 400 secrets/stream-picker-config.key
#   # edit .env: set ADDON_SECRET (openssl rand -hex 24) and ADDON_PUBLIC_URL
#   docker compose up -d
#
# First run: open http://<host>:8011/ and create the dashboard
# username/password used from then on.
# Everything you set there
# is written to ./data/config.json and applied on the next restart, so the only
# value this file really needs is ADDON_SECRET.
#
# Update later with:  docker compose pull && docker compose up -d

services:
  stream-picker:
    image: ghcr.io/arah91-bit/streampicker:latest
    # Building from a clone of the repo instead? Swap the image line for:
    #   build: .
    container_name: stream-picker
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    read_only: true
    cap_drop:
      - ALL
    # Used only by app.entrypoint to repair fresh/legacy bind-mount ownership
    # and drop to UID/GID 1000. The serving process retains no capabilities.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    tmpfs:
      - /tmp:rw,nosuid,noexec,size=256m
    ports:
      - "8011:8000"          # host:container — change 8011 if it's already taken
    environment:
      # Fail fast with a clear message instead of a crash loop if it's unset.
      ADDON_SECRET: "${ADDON_SECRET:?Set ADDON_SECRET in .env — generate one with openssl rand -hex 24}"
      CONFIG_ENCRYPTION_KEY_FILE: /run/secrets/stream_picker_config_key
    env_file:
      - .env                 # passes ADDON_PUBLIC_URL and any other seeds through
    volumes:
      # Dashboard settings (config.json) + source-health telemetry. Persisting
      # this is what lets the dashboard remember your setup across rebuilds.
      - ./data:/data
      # Separate encryption root: config.json contains ciphertext, never this key.
      - ./secrets/stream-picker-config.key:/run/secrets/stream_picker_config_key:ro
    healthcheck:
      # The slim image has no curl; python3 + urllib is always present.
      test: ["CMD", "python3", "-c",
             "import urllib.request;urllib.request.urlopen('http://localhost:8000/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── connecting to an existing *arr / Jellyfin stack ──────────────────────
    # If Radarr/Sonarr/Jellyseerr run in another compose project on this host,
    # join their network so you can point the dashboard at http://radarr:7878
    # etc. instead of IP:port. Uncomment here and the top-level block below,
    # and set the name to that project's network (`docker network ls`).
    #networks:
    #  - media

#networks:
#  media:
#    external: true
#    name: media-network
