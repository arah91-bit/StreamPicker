# Build the image, run the full test suite INSIDE it (same environment users
# run), and only then publish to GitHub Container Registry. The published
# image is what makes the two-file install work: someone with just
# docker-compose.yml + .env never builds anything.
#
#   ghcr.io/arah91-bit/streampicker:latest   — moving tag, tracks main
#   ghcr.io/arah91-bit/streampicker:<sha>    — immutable, for pinning/rollback
#
# One-time after the first successful run: make the package public at
# github.com/users/arah91-bit/packages/container/streampicker/settings
# (GHCR creates new packages as private even for public repos).

name: Test & publish image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/arah91-bit/streampicker

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: streampicker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test suite inside the image
        run: |
          docker run --rm -v "$PWD":/work -w /work --entrypoint sh \
            streampicker:test \
            -c "pip install -q pytest && python -m pytest tests -q"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
